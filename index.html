<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen de Datos - Recepción</title>
   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #001f3f;
            --secondary-color: #007bff;
            --bg-color: #f0f2f5;
            --surface-color: #ffffff;
            --text-color: #333;
            --border-color: #dee2e6;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-color );
            margin: 0;
            padding: 20px;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: 600;
        }
        .nav-button {
            background: none;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }
        .header .nav-button {
             opacity: 0.5; /* Desactivados por ahora */
        }
        .main-content {
            padding: 1.5rem;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        .date-range-display {
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
        }
        .chart-container {
            position: relative;
            height: 60vh;
            min-height: 300px;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: #f8f9fa;
            border-top: 1px solid var(--border-color);
        }
        .checkbox-group label {
            margin-right: 1.5rem;
            cursor: pointer;
        }
        .report-button {
            padding: 0.6rem 1.2rem;
            font-size: 1rem;
            font-weight: 600;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 2rem; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content h2 { margin-top: 0; }
        .modal-content .form-group { margin-bottom: 1rem; }
        .modal-content label { display: block; margin-bottom: 0.5rem; }
        .modal-content input { width: 100%; padding: 0.5rem; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem; }
        .modal-buttons button { padding: 0.6rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; }
        .btn-primary { background-color: var(--secondary-color); color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <button class="nav-button" disabled>‹</button>
            <div class="header-title">Recepción de Emergencia</div>
            <button class="nav-button" disabled>›</button>
        </header>

        <main class="main-content">
            <div class="chart-header">
                <button class="nav-button" id="prevWeek">‹</button>
                <div class="date-range-display" id="dateRange"></div>
                <button class="nav-button" id="nextWeek">›</button>
            </div>
            <div class="chart-container">
                <canvas id="reportChart"></canvas>
            </div>
        </main>

        <footer class="footer">
            <div class="checkbox-group">
                <label><input type="checkbox" id="showRegistros" checked> Registros</label>
                <label><input type="checkbox" id="showIngresos" checked> Ingreso C.C.</label>
            </div>
            <button class="report-button" id="openReportModal">Reporte</button>
        </footer>
    </div>

    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h2>Generar Reporte</h2>
            <div class="form-group">
                <label for="startDate">Fecha de Inicio:</label>
                <input type="date" id="startDate">
            </div>
            <div class="form-group">
                <label for="endDate">Fecha de Fin:</label>
                <input type="date" id="endDate">
            </div>
            <div class="modal-buttons">
                <button id="cancelReport" class="btn-secondary">Cancelar</button>
                <button id="generateReport" class="btn-primary">Generar</button>
            </div>
        </div>
    </div>
<script>
    // --- CONFIGURACIÓN ---
    const SUPABASE_URL = 'https://esiklpxyectbekxvajnw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzaWtscHh5ZWN0YmVreHZham53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE2OTI1MjEsImV4cCI6MjA3NzI2ODUyMX0.mtQnqUrTmhmN1DQxOAUnGpizhYZobStHDH0cz_XfKGU';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY );

    // --- ELEMENTOS DEL DOM ---
    const dateRangeDisplay = document.getElementById('dateRange');
    const chartCanvas = document.getElementById('reportChart');
    const prevWeekBtn = document.getElementById('prevWeek');
    const nextWeekBtn = document.getElementById('nextWeek');
    const showRegistrosCheck = document.getElementById('showRegistros');
    const showIngresosCheck = document.getElementById('showIngresos');
    const reportModal = document.getElementById('reportModal');
    const openReportModalBtn = document.getElementById('openReportModal');
    const cancelReportBtn = document.getElementById('cancelReport');
    const generateReportBtn = document.getElementById('generateReport');

    let chartInstance = null;
    let currentMonday = getStartOfWeek(new Date()); // ¡CORREGIDO! Siempre empieza con la fecha de hoy

    // --- LÓGICA PRINCIPAL ---
    document.addEventListener('DOMContentLoaded', () => {
        loadChartData();
        prevWeekBtn.addEventListener('click', () => changeWeek(-7));
        nextWeekBtn.addEventListener('click', () => changeWeek(7));
        showRegistrosCheck.addEventListener('change', loadChartData);
        showIngresosCheck.addEventListener('change', loadChartData);
        
        // ¡CORREGIDO! El botón de reporte ahora sí funciona
        openReportModalBtn.addEventListener('click', () => {
            reportModal.style.display = 'flex';
        });
        cancelReportBtn.addEventListener('click', () => {
            reportModal.style.display = 'none';
        });
        generateReportBtn.addEventListener('click', handleGenerateReport);
    });

    function changeWeek(days) {
        currentMonday.setDate(currentMonday.getDate() + days);
        loadChartData();
    }

    // ¡CORREGIDO! Lógica de cálculo de semana robusta
    function getStartOfWeek(d) {
        const date = new Date(d);
        const day = date.getDay(); // Domingo = 0, Lunes = 1, ..., Sábado = 6
        const diff = date.getDate() - day + (day === 0 ? -6 : 1); // Ajuste para que la semana empiece en Lunes
        const monday = new Date(date.setDate(diff));
        monday.setHours(0, 0, 0, 0); // Limpiar la hora para evitar errores de zona horaria
        return monday;
    }

    async function loadChartData() {
        const fromDate = new Date(currentMonday);
        const toDate = new Date(fromDate);
        toDate.setDate(fromDate.getDate() + 4); // Lunes a Viernes

        const fromString = fromDate.toISOString().split('T')[0];
        const toString = toDate.toISOString().split('T')[0];

        dateRangeDisplay.textContent = `${fromDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })} - ${toDate.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' })}`;

        try {
            const { data, error } = await supabase
                .from('data_reportes')
                .select('fecha, nro_registro, nro_ingreso')
                .gte('fecha', fromString)
                .lte('fecha', toString)
                .order('fecha', { ascending: true });

            if (error) throw error;

            renderChart(data);

        } catch (error) {
            console.error("Error cargando datos:", error);
            const ctx = chartCanvas.getContext('2d');
            ctx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
            ctx.fillText('Error al cargar los datos.', chartCanvas.width / 2, chartCanvas.height / 2);
        }
    }

    function renderChart(data) {
        const labels = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes'];
        const registrosData = new Array(5).fill(0);
        const ingresosData = new Array(5).fill(0);

        data.forEach(row => {
            const dayOfWeek = new Date(row.fecha + 'T00:00:00').getUTCDay(); // Usar getUTCDay para evitar problemas de zona horaria
            const index = dayOfWeek - 1; // Lunes=0, Martes=1...
            if (index >= 0 && index < 5) {
                registrosData[index] = row.nro_registro || 0;
                ingresosData[index] = row.nro_ingreso || 0;
            }
        });

        if (chartInstance) {
            chartInstance.destroy();
        }

        const ctx = chartCanvas.getContext('2d');
        ctx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);

        // ¡CORREGIDO! Lógica para mostrar "No hay datos"
        if (data.length === 0) {
            ctx.font = '1.2rem Arial';
            ctx.fillStyle = '#6c757d';
            ctx.textAlign = 'center';
            ctx.fillText('No hay datos para este período', chartCanvas.width / 2, chartCanvas.height / 2);
            return;
        }

        const datasets = [];
        if (showRegistrosCheck.checked) {
            datasets.push({
                label: 'Registros',
                data: registrosData,
                backgroundColor: 'rgba(0, 123, 255, 0.7)',
                borderColor: 'rgba(0, 123, 255, 1)',
                borderWidth: 1
            });
        }
        if (showIngresosCheck.checked) {
            datasets.push({
                label: 'Ingreso C.C.',
                data: ingresosData,
                backgroundColor: 'rgba(40, 167, 69, 0.7)',
                borderColor: 'rgba(40, 167, 69, 1)',
                borderWidth: 1
            });
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    function handleGenerateReport() {
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        if (!startDate || !endDate) {
            alert('Por favor, seleccione ambas fechas.');
            return;
        }
        alert(`Funcionalidad pendiente: Generar un reporte desde ${startDate} hasta ${endDate}.`);
        reportModal.style.display = 'none';
    }
</script>

</body>
</html>
